<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
     <title>Weather App</title>
     <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
     <script>
          window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
     </script>
     <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
     <div class="container">
          <h1>Weather App</h1>
          <p class="author">Created by Howard Mach</p>
          
          <div class="unit-toggle">
               <label>
                    <input type="radio" name="temp-unit" value="celsius" id="celsius" checked> °C
               </label>
               <label>
                    <input type="radio" name="temp-unit" value="fahrenheit" id="fahrenheit"> °F
               </label>
               <span class="unit-divider" aria-hidden="true">|</span>
               <label>
                    <input type="radio" name="wind-unit" value="kmh" id="kmh" checked> km/h
               </label>
               <label>
                    <input type="radio" name="wind-unit" value="mph" id="mph"> mph
               </label>
              <span class="unit-divider" aria-hidden="true">|</span>
              <label>
                   <input type="radio" name="precip-unit" value="mm" id="mm" checked> mm
              </label>
              <label>
                   <input type="radio" name="precip-unit" value="in" id="inch"> in
              </label>
          </div>
          <form class="search-box" id="search-box">
          <input type="text" name="location" placeholder="Enter city name or zip code" id="location-input">
          
          <button type="submit" id="search-btn" aria-label="Search">
               <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
          </button>

          <button type="button" id="geo-btn" aria-label="Use Current Location">
               <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4s4-1.79 4-4s-1.79-4-4-4m8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7s7 3.13 7 7s-3.13 7-7 7"/></svg>
          </button>

          <button type="button" id="insight-btn" aria-label="Get Weather Insight">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
               <path d="M9 18h6"></path>
               <path d="M10 22h4"></path>
               <path d="M12 2C9 2 7 4 7 7c0 2 1 3.5 2 4.5V14h6v-2.5c1-1 2-2.5 2-4.5 0-3-2-5-5-5Z"></path>
          </svg>
          </button>
          </form>
          <p id="suggestion-text"></p>

          <p class="errTxt" id="errTxt"></p>
          <div id="location-selector" class="location-selector" style="display: none;">
               <p>Multiple locations found. Please select one:</p>
               <ul id="location-list"></ul>
          </div>
          <div class="weather-details" id="weather-details">
               <h2>Weather In <span id="location">Location Name</span></h2>
               <div class="grid">
                    <div class="temperature">
                         <img src="assets/clear.svg" alt="weather-icon" width="150" height="150" id="weather-condition-icon"/>
                         <p class="temperatureTxt">
                             <span id="temperature">0</span>
                             <span id="unit-symbol">°C</span>
                         </p>
                         <p id="weather-condition-name">Clear</p>
                    </div>
                    <ul class="info">
                         <li><img src="assets/humidity.svg" alt="humidity" width="64" height="64"><span id="humidity">--</span>%</li>
                         <li>
                             <img src="assets/wind.svg" alt="wind-speed" width="64" height="64">
                             <span id="wind-speed">0</span>
                             <span id="wind-unit">km/h</span>
                         </li>
                    </ul>
               </div>
               <h2>Daily Forecast</h2>
               <div class="daily-cards" id="daily-forecast"></div>
          </div>
     </div>
     <p class="attr">Image by <a href="https://pixabay.com/users/elg21-3764790/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=5534319">Enrique</a> from <a href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=5534319">Pixabay</a></p>
     <script src="script.js"></script>
</body>
</html>
